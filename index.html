<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FIFA World Cup 2026 Analysis</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header><h1>FIFA World Cup 2026 Analysis</h1></header>
    <div class="dashboard-container">
        <div class="chart-card"><h3>Nilai Skuad (€ Miliar)</h3><canvas id="squadValueChart"></canvas></div>
        <div class="chart-card"><h3>Firepower Matrix (G+A)</h3><canvas id="firepowerChart"></canvas></div>
        <div class="chart-card"><h3>Prediksi Progresi</h3><canvas id="progressionChart"></canvas></div>
        <div class="chart-card" style="grid-column: span 2;">
            <h3>Pemain Kunci</h3>
            <table>
                <thead><tr><th>Negara</th><th>Pemain Kunci</th></tr></thead>
                <tbody id="playersBody"></tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
